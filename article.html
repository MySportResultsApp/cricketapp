<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article</title>
    <meta name="description" content="Cricket article preview with link to original source.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="brand" aria-label="Cricket News Home">
                <div class="brand-mark"></div>
                <div class="brand-text">
                    <div class="brand-title">Cricket News</div>
                    <div class="brand-subtitle">Article preview</div>
                </div>
            </a>

            <nav class="nav">
                <a class="nav-link" data-nav href="index.html">News</a>
            </nav>
        </div>
    </header>

    <main class="page">
        <div class="container">
            <section id="articleContainer">
                <div class="state-box">
                    <div class="loader"></div>
                    <div class="state-title">Loading article</div>
                    <div class="state-text">Preparing article preview.</div>
                </div>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <div>Cricket News</div>
            <div>Article preview page</div>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            loadArticle();
        });

        async function loadArticle() {
            const container = document.getElementById('articleContainer');
            const id = getQueryParam('id');

            if (!id) {
                renderState(container, createEmptyState(
                    'Article not found',
                    'No article id provided.'
                ));
                return;
            }

            try {
                const articles = await fetchCricketNewsFeed();
                const article = getArticleById(articles, id);

                if (!article) {
                    renderState(container, createEmptyState(
                        'Article not found',
                        'This article is no longer available in the feed.'
                    ));
                    return;
                }

                document.title = article.title + ' | Cricket News';

                container.innerHTML = `
                    <article class="card article-card">
                        ${article.image ? `
                            <img class="article-image" src="${escapeHtml(article.image)}" alt="${escapeHtml(article.title)}">
                        ` : ''}

                        <div class="card-body">
                            <h1 class="article-title">${escapeHtml(article.title)}</h1>

                            <div class="article-meta">
                                ${escapeHtml(article.sourceName)}
                                ${article.published ? ' • ' + escapeHtml(formatDisplayDateTime(article.published)) : ''}
                            </div>

                            <div class="article-desc" style="margin-top:12px;">
                                ${escapeHtml(article.description || 'Open the full article to read more.')}
                            </div>

                            <a class="button" style="margin-top:16px;" 
                               href="${escapeHtml(article.link)}" 
                               target="_blank" 
                               rel="noopener noreferrer">
                               Read Full Article
                            </a>
                        </div>
                    </article>
                `;
            } catch (error) {
                console.error('=ARTICLE ERROR=', error);

                renderState(container, createErrorState(
                    'Failed to load article',
                    'Could not fetch article data.'
                ));
            }
        }
    </script>
</body>
</html>
